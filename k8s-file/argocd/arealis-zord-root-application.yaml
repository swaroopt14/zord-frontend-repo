apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: arealis-zord-root
  namespace: argocd
  finalizers:
    - resources-finalizer.argocd.argoproj.io
spec:
  project: default
  source:
    repoURL: https://github.com/Arealis-network/Arealis-Zord.git
    targetRevision: prod
    path: k8s-file/argocd/children
  destination:
    server: https://kubernetes.default.svc
    namespace: argocd
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
