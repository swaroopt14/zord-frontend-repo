apiVersion: v1
kind: ConfigMap
metadata:
  name: otel-collector-config
  namespace: arealis-zord
data:
  otel-collector-config.yaml: |
    receivers:
      otlp:
        protocols:
          grpc:
            endpoint: 0.0.0.0:4317
          http:
            endpoint: 0.0.0.0:4318

    processors:
      batch:
        timeout: 1s
        send_batch_size: 1024
      memory_limiter:
        check_interval: 1s
        limit_mib: 256

    exporters:
      otlp/jaeger:
        endpoint: jaeger:14250
        tls:
          insecure: true
      prometheus:
        endpoint: 0.0.0.0:8889

    extensions:
      health_check:
        endpoint: 0.0.0.0:13133

    service:
      extensions: [health_check]
      pipelines:
        traces:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [otlp/jaeger]
        metrics:
          receivers: [otlp]
          processors: [memory_limiter, batch]
          exporters: [prometheus]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  namespace: arealis-zord
data:
  prometheus.yml: |
    global:
      scrape_interval: 15s
      evaluation_interval: 15s

    scrape_configs:
      - job_name: prometheus
        static_configs:
          - targets: ["localhost:9090"]

      - job_name: otel-collector
        static_configs:
          - targets: ["otel-collector:8888", "otel-collector:8889"]
        scrape_interval: 10s

      - job_name: zord-edge
        metrics_path: /metrics
        static_configs:
          - targets: ["zord-edge:8080"]

      - job_name: zord-intent-engine
        metrics_path: /metrics
        static_configs:
          - targets: ["zord-intent-engine:8083"]

      - job_name: zord-relay
        metrics_path: /metrics
        static_configs:
          - targets: ["zord-relay:8081"]

      - job_name: zord-token-enclave
        metrics_path: /metrics
        static_configs:
          - targets: ["zord-token-enclave:8087"]

      - job_name: zord-prompt-layer
        metrics_path: /metrics
        static_configs:
          - targets: ["zord-prompt-layer:8086"]
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: grafana-datasources
  namespace: arealis-zord
data:
  datasources.yml: |
    apiVersion: 1
    datasources:
      - name: Prometheus
        type: prometheus
        access: proxy
        url: http://prometheus:9090
        isDefault: true
      - name: Jaeger
        type: jaeger
        access: proxy
        url: http://jaeger:16686
      - name: Loki
        type: loki
        access: proxy
        url: http://loki:3100
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: loki-config
  namespace: arealis-zord
data:
  local-config.yaml: |
    auth_enabled: false
    server:
      http_listen_port: 3100
      grpc_listen_port: 9096
    common:
      path_prefix: /loki
      storage:
        filesystem:
          chunks_directory: /loki/chunks
          rules_directory: /loki/rules
      replication_factor: 1
      ring:
        instance_addr: 127.0.0.1
        kvstore:
          store: inmemory
    schema_config:
      configs:
        - from: 2020-10-24
          store: boltdb-shipper
          object_store: filesystem
          schema: v11
          index:
            prefix: index_
            period: 24h
