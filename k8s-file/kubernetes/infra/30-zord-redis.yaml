apiVersion: v1
kind: Service
metadata:
  name: zord-redis
  namespace: arealis-zord
spec:
  selector:
    app: zord-redis
  ports:
    - name: redis
      port: 6379
      targetPort: 6379
---
apiVersion: apps/v1
kind: StatefulSet
metadata:
  name: zord-redis
  namespace: arealis-zord
spec:
  serviceName: zord-redis
  replicas: 1
  selector:
    matchLabels:
      app: zord-redis
  template:
    metadata:
      labels:
        app: zord-redis
    spec:
      containers:
        - name: redis
          image: redis:7-alpine
          args: ["redis-server", "--appendonly", "yes"]
          ports:
            - containerPort: 6379
          volumeMounts:
            - name: data
              mountPath: /data
          readinessProbe:
            exec:
              command: ["redis-cli", "ping"]
            initialDelaySeconds: 5
            periodSeconds: 5
            timeoutSeconds: 3
  volumeClaimTemplates:
    - metadata:
        name: data
      spec:
        accessModes: ["ReadWriteOnce"]
        resources:
          requests:
            storage: 2Gi
