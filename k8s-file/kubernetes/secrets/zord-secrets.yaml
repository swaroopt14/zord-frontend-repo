apiVersion: v1
kind: Secret
metadata:
  name: zord-secrets
  namespace: arealis-zord
type: Opaque
stringData:
  # Database passwords
  EDGE_DB_PASSWORD: zord_password
  INTENT_DB_PASSWORD: intent_password
  RELAY_DB_PASSWORD: relay_password
  TOKEN_DB_PASSWORD: token_password

  # AWS credentials
  AWS_ACCESS_KEY_ID: REPLACE_AWS_ACCESS_KEY_ID
  AWS_SECRET_ACCESS_KEY: REPLACE_AWS_SECRET_ACCESS_KEY

  # Application secrets
  # Base64-decoded size must be 32 bytes for both keys.
  ZORD_VAULT_KEY: 00Ofxp50eVCizf58ZoX4Zy2T83O38sMSrc3s9Cpb/ac=
  TOKEN_ENCLAVE_MASTER_KEY: 00Ofxp50eVCizf58ZoX4Zy2T83O38sMSrc3s9Cpb/ac=

  # LLM credentials
  GEMINI_API_KEY: REPLACE_GEMINI_API_KEY
  GEMINI_API_KEYS: REPLACE_GEMINI_API_KEY_1,REPLACE_GEMINI_API_KEY_2
