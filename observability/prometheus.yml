global:
  scrape_interval: 15s
  evaluation_interval: 15s

scrape_configs:
  # Prometheus itself
  - job_name: "prometheus"
    static_configs:
      - targets: ["localhost:9090"]

  # OpenTelemetry Collector
  - job_name: "otel-collector"
    static_configs:
      - targets: ["otel-collector:8888", "otel-collector:8889"]
    scrape_interval: 10s

  # Zord Edge service (when running)
  - job_name: "zord-edge"
    static_configs:
      - targets: ["host.docker.internal:8080"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Zord Vault Journal service (when running)
  - job_name: "zord-vault-journal"
    static_configs:
      - targets: ["host.docker.internal:8081"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Zord Relay service (when running)
  - job_name: "zord-relay"
    static_configs:
      - targets: ["host.docker.internal:8082"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Zord Intent Engine service (when running)
  - job_name: "zord-intent-engine"
    static_configs:
      - targets: ["host.docker.internal:8083"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Zord PII Enclave service (when running)
  - job_name: "zord-pii-enclave"
    static_configs:
      - targets: ["host.docker.internal:8084"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s

  # Zord Contracts service (when running)
  - job_name: "zord-contracts"
    static_configs:
      - targets: ["host.docker.internal:8085"]
    metrics_path: "/metrics"
    scrape_interval: 15s
    scrape_timeout: 10s
