# ============================================================================
# AREALIS ZORD PLATFORM - UNIFIED DEPLOYMENT
# Complete microservices deployment with all dependencies
# ============================================================================

version: "3.8"

services:
  # ============================================================================
  # INFRASTRUCTURE SERVICES (Databases, Message Queues, etc.)
  # ============================================================================

  # PostgreSQL for zord-edge service
  zord-edge-postgres:
    image: postgres:16-alpine
    container_name: zord-edge-postgres
    environment:
      - POSTGRES_USER=zord_user
      - POSTGRES_PASSWORD=zord_password
      - POSTGRES_DB=zord_edge_db
    volumes:
      - postgres_edge_data:/var/lib/postgresql/data
      - ./backend/zord-edge/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5433:5432"
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zord_user -d zord_edge_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL for zord-vault-journal service
  zord-vault-postgres:
    image: postgres:16-alpine
    container_name: zord-vault-postgres
    environment:
      - POSTGRES_USER=vault_user
      - POSTGRES_PASSWORD=vault_password
      - POSTGRES_DB=zord_vault_journal_db
    volumes:
      - postgres_vault_data:/var/lib/postgresql/data
      - ./backend/zord-vault-journal/db/migration.sql:/docker-entrypoint-initdb.d/migration.sql:ro
    ports:
      - "5434:5432"
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U vault_user -d zord_vault_journal_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL for zord-intent-engine service
  zord-intent-postgres:
    image: postgres:16-alpine
    container_name: zord-intent-postgres
    environment:
      - POSTGRES_USER=intent_user
      - POSTGRES_PASSWORD=intent_password
      - POSTGRES_DB=zord_intent_engine_db
    volumes:
      - postgres_intent_data:/var/lib/postgresql/data
      - ./backend/zord-intent-engine/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5436:5432"
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intent_user -d zord_intent_engine_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # PostgreSQL for zord-relay service
  zord-relay-postgres:
    image: postgres:16-alpine
    container_name: zord-relay-postgres
    environment:
      - POSTGRES_USER=relay_user
      - POSTGRES_PASSWORD=relay_password
      - POSTGRES_DB=zord_relay_db
    volumes:
      - postgres_relay_data:/var/lib/postgresql/data
      - ./backend/zord-relay/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    ports:
      - "5435:5432"
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay_user -d zord_relay_db"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Redis for message queuing and caching
  zord-redis:
    image: redis:7-alpine
    container_name: zord-redis
    ports:
      - "6379:6379"
    networks:
      - zord-network
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 5
      start_period: 10s

  # Kafka Cluster (3 brokers for high availability)
  zord-kafka-1:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: zord-kafka-1
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@zord-kafka-1:9093,2@zord-kafka-2:9095,3@zord-kafka-3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://zord-kafka-1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_METADATA_LOG_DIR: /var/lib/kafka/metadata
      KAFKA_NUM_PARTITIONS: 1024
    volumes:
      - kafka1_data:/var/lib/kafka/data
      - kafka1_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zord-kafka-2:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: zord-kafka-2
    ports:
      - "9093:9093"
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@zord-kafka-1:9093,2@zord-kafka-2:9095,3@zord-kafka-3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://zord-kafka-2:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_METADATA_LOG_DIR: /var/lib/kafka/metadata
      KAFKA_NUM_PARTITIONS: 1024
    volumes:
      - kafka2_data:/var/lib/kafka/data
      - kafka2_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9093 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  zord-kafka-3:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: zord-kafka-3
    ports:
      - "9094:9094"
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@zord-kafka-1:9093,2@zord-kafka-2:9095,3@zord-kafka-3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://0.0.0.0:9097
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://zord-kafka-3:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"
      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "false"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_METADATA_LOG_DIR: /var/lib/kafka/metadata
      KAFKA_NUM_PARTITIONS: 1024
    volumes:
      - kafka3_data:/var/lib/kafka/data
      - kafka3_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "kafka-topics --bootstrap-server localhost:9094 --list >/dev/null 2>&1",
        ]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 30s

  # ============================================================================
  # ZORD MICROSERVICES
  # ============================================================================

  # Zord Edge - API Gateway and Intent Ingestion
  zord-edge:
    build:
      context: ./backend/zord-edge
      dockerfile: Dockerfile
    container_name: zord-edge-service
    ports:
      - "8080:8080"
    environment:
      - DB_HOST=zord-edge-postgres
      - DB_PORT=5432
      - DB_USER=zord_user
      - DB_PASSWORD=zord_password
      - DB_NAME=zord_edge_db
      - DB_SSLMODE=disable
      - ENVIRONMENT=production
      - JAEGER_ENDPOINT=http://host.docker.internal:14268/api/traces
      - REDIS_ADDR=zord-redis:6379
    depends_on:
      zord-edge-postgres:
        condition: service_healthy
      zord-redis:
        condition: service_healthy
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8080/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Zord Vault Journal - Secure Storage and Audit
  zord-vault-journal:
    build:
      context: ./backend/zord-vault-journal
      dockerfile: Dockerfile
    container_name: zord-vault-journal-service
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=zord-vault-postgres
      - DB_PORT=5432
      - DB_USER=vault_user
      - DB_PASSWORD=vault_password
      - DB_NAME=zord_vault_journal_db
      - DB_SSLMODE=disable
      - ENVIRONMENT=production
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-arealis-zord-vault-encryption-key-change-in-production}
      - STORAGE_PATH=/data/vault
      - REDIS_ADDR=zord-redis:6379
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID:-172d5580e513bfbeb090dc2b3a70698c710338d4}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY:-9452ec452f1aa870c3304258279d0740bffd9bee}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_EC2_METADATA_DISABLED=true
      - S3_BUCKET=${AWS_S3_BUCKET:-arealis-zord-vault}
    depends_on:
      zord-vault-postgres:
        condition: service_healthy
      zord-redis:
        condition: service_healthy
    volumes:
      - vault_data:/data/vault
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8081/health",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Zord Intent Engine - Intent Processing and Canonicalization
  zord-intent-engine:
    build:
      context: ./backend/zord-intent-engine
      dockerfile: Dockerfile
    container_name: zord-intent-engine-service
    ports:
      - "8083:8083"
    environment:
      - DB_HOST=zord-intent-postgres
      - DB_PORT=5432
      - DB_USER=intent_user
      - DB_PASSWORD=intent_password
      - DB_NAME=zord_intent_engine_db
      - DB_SSLMODE=disable
      - REDIS_ADDR=zord-redis:6379
      - VAULT_JOURNAL_URL=http://zord-vault-journal:8081
      - PII_TOKEN_SECRET=${PII_TOKEN_SECRET:-arealis-pii-secret-key}
      - ENVIRONMENT=production
    depends_on:
      zord-intent-postgres:
        condition: service_healthy
      zord-vault-journal:
        condition: service_healthy
      zord-redis:
        condition: service_healthy
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Zord Relay - Message Broker and Event Publishing
  zord-relay:
    build:
      context: ./backend/zord-relay
      dockerfile: Dockerfile
    container_name: zord-relay-service
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BROKERS=zord-kafka-1:9092,zord-kafka-2:9093,zord-kafka-3:9094
      - KAFKA_CONSUMER_GROUP=zord-relay-group
      - KAFKA_READY_TOPIC=z.intent.ready.v1
      - KAFKA_DLQ_TOPIC=z.intent.dlq.v1
      - HTTP_PORT=8082
      - SINK_DATABASE_URL=postgres://relay_user:relay_password@zord-relay-postgres:5432/zord_relay_db?sslmode=disable
      - SOURCE_DATABASE_URL=postgres://intent_user:intent_password@zord-intent-postgres:5432/zord_intent_engine_db?sslmode=disable
      - ENVIRONMENT=production
      - SERVICE_NAME=zord-relay
      - OUTBOX_POLL_INTERVAL=5s
      - OUTBOX_BATCH_SIZE=10
    depends_on:
      zord-kafka-1:
        condition: service_healthy
      zord-kafka-2:
        condition: service_healthy
      zord-kafka-3:
        condition: service_healthy
      zord-relay-postgres:
        condition: service_healthy
      zord-intent-engine:
        condition: service_healthy
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

  # Zord Console - Web Dashboard
  zord-console:
    build:
      context: ./backend/zord-console
      dockerfile: Dockerfile
    container_name: zord-console
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
    depends_on:
      - zord-edge
      - zord-vault-journal
      - zord-intent-engine
      - zord-relay
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

# ============================================================================
# VOLUMES FOR DATA PERSISTENCE
# ============================================================================
volumes:
  # PostgreSQL Data Volumes
  postgres_edge_data:
    driver: local
  postgres_vault_data:
    driver: local
  postgres_intent_data:
    driver: local
  postgres_relay_data:
    driver: local

  # Redis Data Volume
  redis_data:
    driver: local

  # Kafka Data Volumes
  kafka1_data:
    driver: local
  kafka1_metadata:
    driver: local
  kafka2_data:
    driver: local
  kafka2_metadata:
    driver: local
  kafka3_data:
    driver: local
  kafka3_metadata:
    driver: local

  # Application Data Volumes
  vault_data:
    driver: local

# ============================================================================
# NETWORKS
# ============================================================================
networks:
  zord-network:
    driver: bridge
