name: CodeQL

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: "true"

on:
  push:
    branches: ["main"]
  pull_request:
    branches: ["main"]
  schedule:
    - cron: "30 2 * * 1"
  workflow_dispatch:

permissions:
  actions: read
  contents: read
  security-events: write

jobs:
  analyze:
    name: Analyze (${{ matrix.language }})
    runs-on: ubuntu-latest
    env:
      CODEQL_RESULTS_DIR: codeql-results
    strategy:
      fail-fast: false
      matrix:
        include:
          - language: go
            build-mode: manual
          - language: javascript-typescript
            build-mode: none

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        if: matrix.language == 'go'
        uses: actions/setup-go@v5
        with:
          go-version: "1.25.6"
          cache: false

      - name: Initialize CodeQL
        uses: github/codeql-action/init@v4
        with:
          languages: ${{ matrix.language }}
          build-mode: ${{ matrix.build-mode }}
          queries: security-and-quality

      - name: Build Go modules
        if: matrix.language == 'go'
        shell: bash
        run: |
          set -euo pipefail
          modules=(
            backend/zord-edge
            backend/zord-intent-engine
            backend/zord-outcome-engine
            backend/zord-relay
            backend/zord-token-enclave
            backend/zord-intelligence
            backend/zord-prompt-layer
          )

          for module in "${modules[@]}"; do
            if [[ -f "${module}/go.mod" ]]; then
              echo "Building ${module}"
              (
                cd "${module}"
                go mod tidy
                go build ./...
              )
            fi
          done

      - name: Perform CodeQL Analysis
        uses: github/codeql-action/analyze@v4
        with:
          upload: false
          output: ${{ env.CODEQL_RESULTS_DIR }}

      - name: Upload CodeQL SARIF Artifact
        uses: actions/upload-artifact@v4
        with:
          name: codeql-sarif-${{ matrix.language }}
          path: ${{ env.CODEQL_RESULTS_DIR }}/${{ matrix.language }}.sarif
          if-no-files-found: error

      - name: Upload To GitHub Code Scanning
        if: ${{ vars.ENABLE_GITHUB_CODE_SCANNING == 'true' }}
        uses: github/codeql-action/upload-sarif@v4
        with:
          sarif_file: ${{ env.CODEQL_RESULTS_DIR }}/${{ matrix.language }}.sarif
