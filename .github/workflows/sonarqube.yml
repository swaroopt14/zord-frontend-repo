name: SonarQube

on:
  push:
  pull_request:
  workflow_dispatch:

permissions:
  contents: read
  pull-requests: read

concurrency:
  group: sonarqube-${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scan:
    runs-on: ubuntu-latest
    env:
      GO_VERSION: "1.25.0"
      NODE_VERSION: "20"
      FRONTEND_DIR: backend/zord-console
      SONAR_TOKEN: ${{ secrets.SONAR_TOKEN }}
      SONAR_HOST_URL: ${{ secrets.SONAR_HOST_URL }}
      GO_MODULE_DIRS: >-
        backend/zord-edge
        backend/zord-intent-engine
        backend/zord-outcome-engine
        backend/zord-relay
        backend/zord-token-enclave
        backend/zord-intelligence
        backend/zord-prompt-layer

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Go
        uses: actions/setup-go@v5
        with:
          go-version: ${{ env.GO_VERSION }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: ${{ env.NODE_VERSION }}
          cache: npm
          cache-dependency-path: ${{ env.FRONTEND_DIR }}/package-lock.json

      - name: Run backend tests and collect coverage
        shell: bash
        run: |
          set -euo pipefail
          rm -rf coverage
          mkdir -p coverage

          for module in ${GO_MODULE_DIRS}; do
            if [[ -f "${module}/go.mod" ]]; then
              name="$(basename "${module}")"
              echo "Testing ${name}"
              (
                cd "${module}"
                go mod download
                go test ./... -covermode=count -coverprofile="../../coverage/${name}.out"
              )
            fi
          done

          coverage_reports="$(find coverage -name '*.out' -type f | sort | paste -sd, -)"
          echo "GO_COVERAGE_REPORTS=${coverage_reports}" >> "${GITHUB_ENV}"

      - name: Install frontend dependencies
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm ci

      - name: Lint frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run lint

      - name: Build frontend
        working-directory: ${{ env.FRONTEND_DIR }}
        run: npm run build

      - name: SonarQube Scan
        if: ${{ env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-scan-action@v5
        with:
          args: >-
            -Dsonar.go.coverage.reportPaths=${{ env.GO_COVERAGE_REPORTS }}

      - name: SonarQube not configured
        if: ${{ env.SONAR_TOKEN == '' || env.SONAR_HOST_URL == '' }}
        run: |
          echo "SONAR_TOKEN and/or SONAR_HOST_URL is not configured."
          echo "Skipping SonarQube scan."

      - name: SonarQube Quality Gate
        if: ${{ success() && env.SONAR_TOKEN != '' && env.SONAR_HOST_URL != '' }}
        uses: SonarSource/sonarqube-quality-gate-action@master
        timeout-minutes: 10
