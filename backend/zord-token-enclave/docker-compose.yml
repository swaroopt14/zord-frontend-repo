version: "3.9"

services:
  zord-token-enclave:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zord-token-enclave-service
    ports:
      - "8087:8087"
    env_file:
      - ./.env
    environment:
      # App
      - PORT=8087

      # DB (inside docker network)
      - DB_HOST=zord-token-enclave-postgres
      - DB_PORT=5432
      - DB_USER=token_user
      - DB_PASSWORD=token_password
      - DB_NAME=zord_token_enclave_db
      - DB_SSLMODE=disable
      - DB_URL=postgres://token_user:token_password@zord-token-postgres:5432/zord_token_enclave?sslmode=disable


      # Crypto
      - MASTER_KEY=W2MSQaooUlXVmVxGB7NgU06keCyKgQ+NlbdaDHCERAE=

      - ENVIRONMENT=production
    depends_on:
      - postgres
    networks:
      - zord-network
    restart: unless-stopped
    # Container healthcheck intentionally omitted for minimal scratch image.
    # Use platform/orchestrator health probes instead.

  postgres:
    image: postgres:16-alpine
    container_name: zord-token-enclave-postgres
    command: postgres -c 'max_connections=100'
    environment:
      - POSTGRES_USER=token_user
      - POSTGRES_PASSWORD=token_password
      - POSTGRES_DB=zord_token_enclave_db
    volumes:
      - postgres_token_enclave_data:/var/lib/postgresql/data
    ports:
      - "5437:5432"   # optional: for local debugging
    networks:
      - zord-network
    restart: unless-stopped

volumes:
  postgres_token_enclave_data:

networks:
  zord-network:
    external: true
    name: zord-shared-network
