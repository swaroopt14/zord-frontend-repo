# Docker Compose configuration for Zord Relay microservice with Kafka KRaft
# This file defines the services needed for message relay functionality using KRaft mode

version: "3.8"  # Docker Compose file format version

services:  # Define the containers/services to run
  zord-relay:  # Main relay service
    build:  # Build configuration
      context: .  # Build context (current directory)
      dockerfile: Dockerfile  # Dockerfile to use for building
    container_name: zord-relay-service  # Name of the running container
    ports:  # Port mapping (host:container)
      - "8082:8082"  # Map host port 8082 to container port 8082
    environment:  # Environment variables for the application
      - KAFKA_BROKERS=kafka:9092  # Kafka broker addresses (internal network)
      - KAFKA_CONSUMER_GROUP=zord-relay-group  # Consumer group for this service
      - HTTP_PORT=8082  # HTTP server port
      - DATABASE_URL=postgres://relay_user:relay_password@postgres:5432/zord_relay_db?sslmode=disable  # Database connection
      - ENVIRONMENT=production  # Environment setting
      - SERVICE_NAME=zord-relay  # Service name for logging
      - OUTBOX_POLL_INTERVAL=5s  # How often to check for new messages
      - OUTBOX_BATCH_SIZE=10  # Number of messages to process per batch
    depends_on:  # Service dependencies (start these services first)
      - kafka
      - postgres
    networks:  # Networks this service connects to
      - zord-network
    restart: unless-stopped  # Restart policy
    healthcheck:  # Health check configuration
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8082/health"]  # Health check command
      interval: 30s  # Check interval
      timeout: 10s  # Check timeout
      retries: 3  # Number of retries before marking unhealthy
      start_period: 60s  # Initial delay before starting health checks

  kafka:  # Apache Kafka with KRaft mode (no ZooKeeper needed)
    image: confluentinc/cp-kafka:7.4.0  # Kafka image with Confluent Platform
    container_name: zord-kafka  # Container name
    ports:  # External access ports
      - "9092:9092"  # Kafka broker port
    user: root  # Run as root to fix permission issues
    environment:  # Kafka KRaft configuration
      # KRaft mode settings
      - KAFKA_NODE_ID=1  # Unique node ID for this broker
      - KAFKA_PROCESS_ROLES=broker,controller  # Roles this node plays
      - KAFKA_CONTROLLER_QUORUM_VOTERS=1@kafka:9093  # Controller quorum configuration
      - KAFKA_CONTROLLER_LISTENER_NAMES=CONTROLLER  # Controller listener name
      - KAFKA_LISTENERS=PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093  # Listener configuration
      - KAFKA_ADVERTISED_LISTENERS=PLAINTEXT://localhost:9092  # Advertised listeners for clients
      - KAFKA_LISTENER_SECURITY_PROTOCOL_MAP=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT  # Security protocol mapping
      - KAFKA_INTER_BROKER_LISTENER_NAME=PLAINTEXT  # Inter-broker communication listener
      - CLUSTER_ID=abcdefghijklmnopqrstuv  # Required cluster ID for KRaft mode

      # KRaft cluster settings
      - KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR=1  # Replication factor for internal topics
      - KAFKA_TRANSACTION_STATE_LOG_MIN_ISR=1  # Minimum in-sync replicas
      - KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR=1  # Replication factor for transaction logs
      - KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS=0  # Initial rebalance delay
      - KAFKA_AUTO_CREATE_TOPICS_ENABLE=true  # Auto-create topics

      # KRaft controller settings
      - KAFKA_METADATA_LOG_DIR=/tmp/kraft-controller-logs  # Controller metadata log directory
      - KAFKA_METADATA_LOG_SEGMENT_BYTES=1073741824  # Metadata log segment size (1GB)

      # General Kafka settings
      - KAFKA_LOG_DIRS=/tmp/kraft-broker-logs  # Broker log directories
      - KAFKA_NUM_PARTITIONS=3  # Default number of partitions for auto-created topics
      - KAFKA_DEFAULT_REPLICATION_FACTOR=1  # Default replication factor
    volumes:  # Volume mounts for data persistence
      - kafka_data:/tmp/kraft-broker-logs  # Mount Kafka data directory
      - kafka_metadata:/tmp/kraft-controller-logs  # Mount KRaft metadata
    networks:  # Networks
      - zord-network
    restart: unless-stopped
    healthcheck:  # Health check for Kafka
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]  # Check if Kafka is responsive
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  postgres:  # PostgreSQL database for outbox pattern
    image: postgres:16-alpine  # PostgreSQL image
    container_name: zord-relay-postgres  # Container name
    environment:  # Database configuration
      - POSTGRES_USER=relay_user  # Database superuser
      - POSTGRES_PASSWORD=relay_password  # Database password
      - POSTGRES_DB=zord_relay_db  # Default database to create
    volumes:  # Volume mounts for data persistence
      - postgres_relay_data:/var/lib/postgresql/data  # Mount data directory
    ports:  # External access port (different to avoid conflicts)
      - "5435:5432"  # Map host port 5435 to container port 5432
    networks:  # Networks
      - zord-network
    restart: unless-stopped

volumes:  # Named volumes for data persistence
  kafka_data:  # Volume for Kafka broker data
  kafka_metadata:  # Volume for KRaft controller metadata
  postgres_relay_data:  # Volume for PostgreSQL data

networks:  # Custom networks for service communication
  zord-network:  # Isolated network for Zord services
    driver: bridge  # Bridge network driver for container communication
