services:
  zord-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zord-relay-service
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BROKERS=broker1:9092,broker2:9093,broker3:9094
      - KAFKA_CONSUMER_GROUP=zord-relay-group
      - KAFKA_READY_TOPIC=z.intent.ready.v1
      - KAFKA_DLQ_TOPIC=z.intent.dlq.v1
      - KAFKA_PUBLISH_FAILURE_DLQ_TOPIC=z.intent.publish_failure.dlq.v1
      - KAFKA_POISON_EVENT_DLQ_TOPIC=z.intent.poison_event.dlq.v1
      - HTTP_PORT=8082
      - INTENT_ENGINE_BASE_URL=http://zord-intent-engine:8083
      - ENVIRONMENT=production
      - SERVICE_NAME=zord-relay
      - OUTBOX_POLL_INTERVAL=5s
      - OUTBOX_BATCH_SIZE=10
      - OUTBOX_WORKER_COUNT=24
      - OUTBOX_MAX_ATTEMPTS=7
      - OUTBOX_MAX_AGE=8h
    networks:
      - zord-network
    restart: unless-stopped
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: zord-relay-postgres
    environment:
      - POSTGRES_USER=relay_user
      - POSTGRES_PASSWORD=relay_password
      - POSTGRES_DB=zord_relay_db
    volumes:
      - postgres_relay_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql
    ports:
      - "5435:5432"
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay_user -d zord_relay_db"]
      interval: 10s
      timeout: 5s
      retries: 10
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_relay_data:

networks:
  zord-network:
    external: true
    name: zord-shared-network