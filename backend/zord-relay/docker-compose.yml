services:

  zord-relay:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zord-relay-service

    ports:
      - "8082:8082"

    environment:
      - SERVICE_NAME=zord-relay
      - POD_NAME=zord-relay-1

      - DATABASE_URL=postgres://relay_user:relay_password@zord-relay-postgres:5432/zord_relay_db?sslmode=disable
      - DB_MAX_OPEN_CONNS=40
      - DB_MAX_IDLE_CONNS=15

      - KAFKA_BROKERS=broker1:9092,broker2:9093,broker3:9094
      - KAFKA_DISPATCH_EVENTS_TOPIC=z.dispatch.events.v1
      - KAFKA_PUBLISH_FAILURE_DLQ_TOPIC=z.dispatch.dlq.publish.v1
      - KAFKA_POISON_EVENT_DLQ_TOPIC=z.dispatch.dlq.poison.v1

      - INTENT_ENGINE_BASE_URL=http://zord-intent-engine:8083
      - LEASE_TTL_SECONDS=120

      - DISPATCH_WORKER_COUNT=20
      - DISPATCH_BATCH_SIZE=20
      - DISPATCH_POLL_INTERVAL=1s

      - RELAY_WORKER_COUNT=10
      - RELAY_BATCH_SIZE=50
      - RELAY_POLL_INTERVAL=500ms

      - MAX_ATTEMPTS=7
      - MAX_AGE=8h

      - PSP_BASE_URL=http://host.docker.internal:8099
      - PSP_TIMEOUT_SECONDS=30

      - TOKEN_ENCLAVE_BASE_URL=

      - HEALTH_PORT=8082

      - ENVIRONMENT=production
      - OTEL_EXPORTER_OTLP_ENDPOINT=

    depends_on:
      postgres:
        condition: service_healthy

    networks:
      - zord-network   

    restart: unless-stopped

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

  postgres:
    image: postgres:16-alpine
    container_name: zord-relay-postgres

    environment:
      - POSTGRES_USER=relay_user
      - POSTGRES_PASSWORD=relay_password
      - POSTGRES_DB=zord_relay_db

    volumes:
      - postgres_relay_data:/var/lib/postgresql/data
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro

    ports:
      - "5435:5432"

    networks:
      - zord-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay_user -d zord_relay_db"]
      interval: 10s
      timeout: 5s
      retries: 10
      start_period: 10s

    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"

volumes:
  postgres_relay_data:

networks:
  zord-network:
    external: true
    name: zord-shared-network