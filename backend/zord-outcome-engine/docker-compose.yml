
services: 
  zord-outcome-engine: 
    build: 
      context: . 
      dockerfile: Dockerfile 
    container_name: zord-outcome-engine-service 
    ports: 
      - "8081:8081" 
    env_file:
      - .env
    environment: 
      - KAFKA_BROKERS=broker1:9092,broker2:9093,broker3:9094
      - KAFKA_TOPIC=z.dispatch.events.v1
      - DB_HOST=zord-outcome-postgres
      - DB_PORT=5432 
      - DB_USER=outcome_user 
      - DB_PASSWORD=outcome_password 
      - DB_NAME=zord_outcome_db 
      - DB_SSLMODE=disable 
      - ENVIRONMENT=production 
      - JAEGER_ENDPOINT=http://host.docker.internal:14268/api/traces 
      - AWS_REGION=ap-south-1
      - AWS_EC2_METADATA_DISABLED=true
      - S3_BUCKET=arealis-zord-outcome
    depends_on:
      postgres:
        condition: service_healthy
    networks: 
      - zord-network
    restart: unless-stopped 
    healthcheck:
      test: ["CMD", "wget", "--quiet", "--tries=1", "--spider", "http://localhost:8081/v1/health"] 
      interval: 30s 
      timeout: 10s 
      retries: 3 
      start_period: 40s

  postgres: 
    image: postgres:16-alpine 
    container_name: zord-outcome-postgres 
    command: postgres -c 'max_connections=100'
    environment: 
      - POSTGRES_USER=outcome_user 
      - POSTGRES_PASSWORD=outcome_password 
      - POSTGRES_DB=zord_outcome_db 
    volumes: 
      - postgres_outcome_data:/var/lib/postgresql/data 
    ports: 
      - "5434:5432" 
    networks: 
      - zord-network
    restart: unless-stopped 
    healthcheck: 
      test: ["CMD-SHELL", "pg_isready -U outcome_user -d zord_outcome_db"] 
      interval: 10s
      timeout: 5s 
      retries: 5 
      start_period: 10s 

volumes:
  postgres_outcome_data:

networks:
  zord-network:
    external: true
    name: zord-shared-network
