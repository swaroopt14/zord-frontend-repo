# Docker Compose configuration for Zord Intent Engine microservice
# This service handles intent canonicalization, validation, and processing

services:
  zord-intent-engine:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zord-intent-engine-service
    ports:
      - "8083:8083"
    env_file:
      - ./.env
    environment:
      - KAFKA_BROKERS=broker1:9092,broker2:9093,broker3:9094
      - KAFKA_TOPIC=vault.envelope.accepted.v1
      - KAFKA_TOPIC_PII_TOKENIZE_REQUEST=pii.tokenize.request
      - KAFKA_TOPIC_PII_TOKENIZE_RESULT=pii.tokenize.result
      - ZORD_PII_ENCLAVE_URL=http://host.docker.internal:8087
      - DB_HOST=zord-intent-postgres
      - DB_PORT=5432
      - DB_USER=intent_user
      - DB_PASSWORD=intent_password
      - DB_NAME=zord_intent_engine_db
      - DB_SSLMODE=disable
      - VAULT_JOURNAL_URL=http://host.docker.internal:8081
      - PII_TOKEN_SECRET=your-secret-key-for-pii-tokenization-change-in-production
      - ENVIRONMENT=production

      - AWS_REGION=ap-southeast-2
      - AWS_EC2_METADATA_DISABLED=true
      - S3_BUCKET=canonical-worm-storage
    depends_on:
      - postgres
    networks:
      - zord-network
    restart: unless-stopped
    # Container healthcheck intentionally omitted for minimal scratch image.
    # Use platform/orchestrator health probes instead.

  postgres:
    image: postgres:16-alpine
    container_name: zord-intent-postgres
    command: postgres -c 'max_connections=100'
    environment:
      - POSTGRES_USER=intent_user
      - POSTGRES_PASSWORD=intent_password
      - POSTGRES_DB=zord_intent_engine_db
    volumes:
      - postgres_intent_data_fix:/var/lib/postgresql/data
    ports:
      - "5436:5432"
    networks:
      - zord-network
    restart: unless-stopped

volumes:
  postgres_intent_data_fix:

networks:
  zord-network:
    external: true
    name: zord-shared-network
