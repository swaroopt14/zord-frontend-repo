services:
  zord-prompt-layer:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zord-prompt-layer
    ports:
      - "8086:8086"
    env_file:
      - .env
    environment:
      - ONNXRUNTIME_SHARED_LIBRARY_PATH=/opt/onnxruntime/lib/libonnxruntime.so
      - LD_LIBRARY_PATH=/opt/onnxruntime/lib
    networks:
      - zord-network
    restart: unless-stopped

networks:
  zord-network:
    external: true
    name: zord-shared-network
