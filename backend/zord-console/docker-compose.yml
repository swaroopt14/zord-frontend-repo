services:
  zord-console:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: zord-console
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - AUTH_COOKIE_SECURE=false
      - ZORD_EDGE_URL=${ZORD_EDGE_URL:-http://host.docker.internal:8080}
      - ZORD_VAULT_URL=${ZORD_VAULT_URL:-http://host.docker.internal:8081}
      - ZORD_RELAY_URL=${ZORD_RELAY_URL:-http://host.docker.internal:8082}
      - ZORD_INTENT_ENGINE_URL=${ZORD_INTENT_ENGINE_URL:-http://host.docker.internal:8083}
      - ZORD_CONTRACTS_URL=${ZORD_CONTRACTS_URL:-http://host.docker.internal:8084}
      - ZORD_PII_ENCLAVE_URL=${ZORD_PII_ENCLAVE_URL:-http://host.docker.internal:8085}
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s
    networks:
      - zord-network

networks:
  zord-network:
    driver: bridge
