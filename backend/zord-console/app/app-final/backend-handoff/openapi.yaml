openapi: 3.0.3
info:
  title: App-Final Dashboard API
  version: 1.0.0
  description: Backend contract for app-final dashboard cards and KPI widgets.
servers:
  - url: /api/v1
paths:
  /app-final/dashboard:
    get:
      summary: Get full app-final dashboard payload
      parameters:
        - in: query
          name: tenant_id
          required: true
          schema:
            type: string
        - in: query
          name: period
          required: false
          schema:
            type: string
            enum: [daily, weekly, monthly]
            default: daily
        - in: query
          name: range
          required: false
          schema:
            type: string
            enum: [1m, 3m, 6m]
            default: 6m
        - in: query
          name: activity_mode
          required: false
          schema:
            type: string
            enum: [transactions, customers]
            default: transactions
        - in: query
          name: from
          required: false
          schema:
            type: string
            format: date-time
        - in: query
          name: to
          required: false
          schema:
            type: string
            format: date-time
      responses:
        '200':
          description: Dashboard payload
          content:
            application/json:
              schema:
                $ref: '#/components/schemas/AppFinalDashboardResponse'
  /app-final/insights/query:
    post:
      summary: Ask follow-up question against insight context
      requestBody:
        required: true
        content:
          application/json:
            schema:
              type: object
              required: [tenant_id, question]
              properties:
                tenant_id:
                  type: string
                question:
                  type: string
                context_window:
                  type: string
                  enum: [24h, 7d, 30d]
                  default: 24h
      responses:
        '200':
          description: Insight answer
          content:
            application/json:
              schema:
                type: object
                required: [answer]
                properties:
                  answer:
                    type: string
                  citations:
                    type: array
                    items:
                      type: string
components:
  schemas:
    AppFinalDashboardResponse:
      type: object
      required:
        - tenant_id
        - generated_at
        - period
        - range
        - activity_mode
        - payments_funnel
        - gross_volume
        - retention
        - activity
        - ai_insights
      properties:
        tenant_id:
          type: string
        generated_at:
          type: string
          format: date-time
        period:
          type: string
          enum: [daily, weekly, monthly]
        range:
          type: string
          enum: [1m, 3m, 6m]
        activity_mode:
          type: string
          enum: [transactions, customers]
        payments_funnel:
          type: object
          required: [stages]
          properties:
            stages:
              type: array
              items:
                type: object
                required: [key, label, value, display]
                properties:
                  key:
                    type: string
                  label:
                    type: string
                  value:
                    type: number
                  display:
                    type: string
                  pct:
                    type: number
                    nullable: true
                  pct_of:
                    type: number
                    nullable: true
        gross_volume:
          type: object
          required: [total, total_display, growth_pct, categories, chips]
          properties:
            total:
              type: number
            total_display:
              type: string
            growth_pct:
              type: number
            categories:
              type: array
              items:
                type: object
                required: [key, label, amount, amount_display, share_pct]
                properties:
                  key:
                    type: string
                  label:
                    type: string
                  amount:
                    type: number
                  amount_display:
                    type: string
                  share_pct:
                    type: number
            chips:
              type: array
              items:
                type: object
                required: [key, label, value, sub]
                properties:
                  key:
                    type: string
                  label:
                    type: string
                  value:
                    type: string
                  sub:
                    type: string
        retention:
          type: object
          required: [range, current_pct, target_pct, gap_pts, health]
          properties:
            range:
              type: string
              enum: [1m, 3m, 6m]
            current_pct:
              type: number
            target_pct:
              type: number
            gap_pts:
              type: number
            health:
              type: string
              enum: [Healthy, Watch, At Risk]
        activity:
          type: object
          required: [mode, value, unit, peak_day, delta, delta_label, fill_target]
          properties:
            mode:
              type: string
              enum: [transactions, customers]
            value:
              type: string
            unit:
              type: string
            peak_day:
              type: string
            delta:
              type: string
            delta_label:
              type: string
            fill_target:
              type: number
              minimum: 0
              maximum: 1
        ai_insights:
          type: object
          required: [score, status_label, status_color, confidence, updated_label, progress, title, description, drivers, chips]
          properties:
            score:
              type: number
              minimum: 0
              maximum: 100
            status_label:
              type: string
            status_color:
              type: string
            confidence:
              type: number
              minimum: 0
              maximum: 100
            updated_label:
              type: string
            progress:
              type: number
              minimum: 0
              maximum: 100
            title:
              type: string
            description:
              type: string
            drivers:
              type: array
              items:
                type: object
                required: [label, value, tone]
                properties:
                  label:
                    type: string
                  value:
                    type: string
                  tone:
                    type: string
                    enum: [positive, neutral, warning]
            chips:
              type: array
              items:
                type: object
                required: [label, value, color, width]
                properties:
                  label:
                    type: string
                  value:
                    type: string
                  color:
                    type: string
                  width:
                    type: number
                    minimum: 0
                    maximum: 100
