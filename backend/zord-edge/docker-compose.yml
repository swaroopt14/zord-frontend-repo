# ---------------------------
# Volumes
# ---------------------------

volumes:
  postgres_edge_data:
  kafka1_data:
  kafka1_metadata:
  kafka2_data:
  kafka2_metadata:
  kafka3_data:
  kafka3_metadata:


# ---------------------------
# Network
# ---------------------------

networks:
  zord-network:
    external: true
    name: zord-shared-network
