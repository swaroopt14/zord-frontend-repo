# Docker Compose configuration for Zord Edge microservice
# This file defines the services, networks, and volumes needed to run the Zord Edge service

services: # Define the containers/services to run
  zord-edge: # Main application service
    build: # Build configuration
      context: . # Build context (current directory)
      dockerfile: Dockerfile # Dockerfile to use for building
    container_name: zord-edge-service # Name of the running container
    ports: # Port mapping (host:container)
      - "8080:8080" # Map host port 8080 to container port 8080
    env_file:
      - .env
    environment: # Environment variables for the application
      - KAFKA_BROKERS=broker1:9092,broker2:9093,broker3:9094
      - KAFKA_TOPIC=vault.envelope.accepted.v1
      - DB_HOST=zord-edge-postgres # Database host (references postgres service)
      - DB_PORT=5432 # Database port
      - DB_USER=zord_user # Database username
      - DB_PASSWORD=zord_password # Database password
      - DB_NAME=zord_edge_db # Database name
      - DB_SSLMODE=disable # Disable SSL for local Docker connections
      - ENVIRONMENT=production # Environment setting
      - JAEGER_ENDPOINT=http://host.docker.internal:14268/api/traces # Jaeger tracing endpoint
      - AWS_REGION=ap-south-1
      - AWS_EC2_METADATA_DISABLED=true
      - AWS_ACCESS_KEY_ID=localtest
      - AWS_SECRET_ACCESS_KEY=localtest
      - S3_BUCKET=arealis-zord-vault
      - ZORD_VAULT_KEY=${ZORD_VAULT_KEY:-MDEyMzQ1Njc4OWFiY2RlZjAxMjM0NTY3ODlhYmNkZWY=}
      - JWT_ISSUER=${JWT_ISSUER:-zord-edge}
      - JWT_AUDIENCE=${JWT_AUDIENCE:-zord-console}
      - JWT_ACCESS_TOKEN_TTL=${JWT_ACCESS_TOKEN_TTL:-15m}
      - JWT_REFRESH_TOKEN_TTL=${JWT_REFRESH_TOKEN_TTL:-720h}
      - JWT_LOCKOUT_THRESHOLD=${JWT_LOCKOUT_THRESHOLD:-5}
      - JWT_LOCKOUT_DURATION=${JWT_LOCKOUT_DURATION:-15m}
      - AUTH_ALLOW_EPHEMERAL_SIGNING_KEY=${AUTH_ALLOW_EPHEMERAL_SIGNING_KEY:-true}
      - JWT_SIGNING_PRIVATE_KEY_BASE64=${JWT_SIGNING_PRIVATE_KEY_BASE64:-}
      - JWT_SIGNING_PRIVATE_KEY_PATH=${JWT_SIGNING_PRIVATE_KEY_PATH:-}
      - VAULT_KEY_ID=key-1234567890
      - OBJECT_STORE_VERSION=v1
    depends_on: # Service dependencies (wait for health checks)
      postgres:
        condition: service_healthy
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy
      broker3:
        condition: service_healthy
    networks: # Networks this service connects to
      - zord-network
    restart: unless-stopped # Restart policy (restart unless manually stopped)
    # Container healthcheck intentionally omitted for minimal scratch image.
    # Use platform/orchestrator health probes instead.

  postgres: # PostgreSQL database service
    image: postgres:16-alpine # Docker image to use
    container_name: zord-edge-postgres # Container name
    command: postgres -c 'max_connections=100'
    environment: # Database configuration
      - POSTGRES_USER=zord_user # Database superuser
      - POSTGRES_PASSWORD=zord_password # Database password
      - POSTGRES_DB=zord_edge_db # Default database to create
    volumes: # Volume mounts for data persistence
      - postgres_edge_data:/var/lib/postgresql/data # Mount data directory
    ports: # External access port (different from internal to avoid conflicts)
      - "5433:5432" # Map host port 5433 to container port 5432
    networks: # Networks this service connects to
      - zord-network
    restart: unless-stopped # Restart policy
    healthcheck: # Health check configuration
      test: ["CMD-SHELL", "pg_isready -U zord_user -d zord_edge_db"] # Check if database is ready
      interval: 10s # Check interval
      timeout: 5s # Check timeout
      retries: 5 # Number of retries before marking unhealthy
      start_period: 10s # Initial delay before starting health checks

  broker1:
    image: confluentinc/cp-kafka:7.4.0
    user: root

    ports:
      - "9092:9092"

    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9095,3@broker3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER

      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:9092

      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT

      CLUSTER_ID: OknI8Q-4S9yVmLbmkhbZWg

      KAFKA_DEFAULT_REPLICATION_FACTOR: 3
      KAFKA_MIN_INSYNC_REPLICAS: 2
      KAFKA_UNCLEAN_LEADER_ELECTION_ENABLE: "false"

      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 3
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 2

      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
      KAFKA_LOG_DIRS: /var/lib/kafka/data
      KAFKA_METADATA_LOG_DIR: /var/lib/kafka/metadata
      KAFKA_NUM_PARTITIONS: 12

    volumes:
      - kafka1_data:/var/lib/kafka/data
      - kafka1_metadata:/var/lib/kafka/metadata

    networks:
      - zord-network

    restart: unless-stopped

    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 15s
      timeout: 15s
      retries: 20
      start_period: 60s
    logging:
      driver: "json-file"
      options:
        max-size: "10m"
        max-file: "3"


