# Docker Compose configuration for Zord Vault Journal microservice
# This file defines the secure journal storage service with encryption and PostgreSQL

services: # Define the containers/services to run
  zord-vault-journal: # Main vault journal service
    build: # Build configuration
      context: . # Build context (current directory)
      dockerfile: Dockerfile # Dockerfile to use for building
    container_name: zord-vault-journal-service # Name of the running container
    ports: # Port mapping (host:container)
      - "8081:8081" # Map host port 8081 to container port 8081
    environment: # Environment variables for the application
      - DB_HOST=zord-vault-postgres # Database host (references postgres service)
      - DB_PORT=5432 # Database port
      - DB_USER=vault_user # Database username
      - DB_PASSWORD=vault_password # Database password
      - DB_NAME=zord_vault_journal_db # Database name
      - DB_SSLMODE=disable # Disable SSL for local development
      - ENVIRONMENT=production # Environment setting
      - ENCRYPTION_KEY=${ENCRYPTION_KEY:-change-me-in-production} # Encryption key (use strong key in production)
      - STORAGE_PATH=/data/vault # Path for encrypted data storage
      - REDIS_ADDR=zord-edge-redis:6379
      # - AWS_ACCESS_KEY_ID=AKIARAKMIDK5WPIBKAPD
      # - AWS_SECRET_ACCESS_KEY=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
      - AWS_REGION=ap-south-1
      - AWS_EC2_METADATA_DISABLED=true
      - S3_BUCKET=arealis-zord-vault
 
    depends_on: # Service dependencies (start postgres first)
      - postgres
    #   - redis-vault
    volumes: # Volume mounts for data persistence
      - vault_data:/data/vault # Mount encrypted data directory
    networks: # Networks this service connects to
      - zord-network
    restart: unless-stopped # Restart policy
    healthcheck: # Health check configuration
      test: [
          "CMD",
          "wget",
          "--quiet",
          "--tries=1",
          "--spider",
          "http://localhost:8081/health",
        ] # Health check command
      interval: 30s # Check interval
      timeout: 10s # Check timeout
      retries: 3 # Number of retries before marking unhealthy
      start_period: 40s # Initial delay before starting health checks

  postgres: # PostgreSQL database service for vault journal
    image: postgres:16-alpine # Docker image to use
    container_name: zord-vault-postgres # Container name
    environment: # Database configuration
      - POSTGRES_USER=vault_user # Database superuser
      - POSTGRES_PASSWORD=vault_password # Database password
      - POSTGRES_DB=zord_vault_journal_db # Default database to create
    volumes: # Volume mounts for data persistence
      - postgres_vault_data_fix:/var/lib/postgresql/data # Mount data directory
    ports: # External access port (different from internal to avoid conflicts)
      - "5434:5432" # Map host port 5434 to container port 5432
    networks: # Networks this service connects to
      - zord-network
    restart: unless-stopped # Restart policy

volumes: # Named volumes for data persistence
  vault_data: # Volume for encrypted vault data
  postgres_vault_data_fix: # Volume for PostgreSQL data
  redis_vault_data: # Volume for Redis vault data
  redis_intent_data: # Volume for Redis intent data

networks: # Custom networks for service communication
  zord-network: # Isolated network for Zord services
    external: true
    name: zord-shared-network
