services:
  # -----------------------------
  # Databases
  # -----------------------------
  zord-edge-postgres:
    image: postgres:16-alpine
    container_name: zord-edge-postgres
    environment:
      - POSTGRES_USER=zord_user
      - POSTGRES_PASSWORD=zord_password
      - POSTGRES_DB=zord_edge_db
    volumes:
      - edge_postgres_data:/var/lib/postgresql/data
      - ./backend/zord-edge/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U zord_user -d zord_edge_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  zord-intent-postgres:
    image: postgres:16-alpine
    container_name: zord-intent-postgres
    environment:
      - POSTGRES_USER=intent_user
      - POSTGRES_PASSWORD=intent_password
      - POSTGRES_DB=zord_intent_engine_db
    volumes:
      - intent_postgres_data:/var/lib/postgresql/data
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U intent_user -d zord_intent_engine_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  zord-relay-postgres:
    image: postgres:16-alpine
    container_name: zord-relay-postgres
    environment:
      - POSTGRES_USER=relay_user
      - POSTGRES_PASSWORD=relay_password
      - POSTGRES_DB=zord_relay_db
    volumes:
      - relay_postgres_data:/var/lib/postgresql/data
      - ./backend/zord-relay/db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U relay_user -d zord_relay_db"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------
  # Redis
  # -----------------------------
  zord-redis:
    image: redis:7-alpine
    container_name: zord-redis
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------
  # Kafka (KRaft, 3 brokers)
  # -----------------------------
  broker1:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: broker1
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9095,3@broker3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092,CONTROLLER://0.0.0.0:9093
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker1:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka1_data:/var/lib/kafka/data
      - kafka1_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9092 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  broker2:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: broker2
    environment:
      KAFKA_NODE_ID: 2
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9095,3@broker3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9093,CONTROLLER://0.0.0.0:9095
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker2:9093
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka2_data:/var/lib/kafka/data
      - kafka2_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9093 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  broker3:
    image: confluentinc/cp-kafka:7.4.0
    user: root
    container_name: broker3
    environment:
      KAFKA_NODE_ID: 3
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@broker1:9093,2@broker2:9095,3@broker3:9097
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9094,CONTROLLER://0.0.0.0:9097
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://broker3:9094
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      CLUSTER_ID: abcdefghijklmnopqrstuv
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    volumes:
      - kafka3_data:/var/lib/kafka/data
      - kafka3_metadata:/var/lib/kafka/metadata
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD-SHELL", "kafka-topics --bootstrap-server localhost:9094 --list >/dev/null 2>&1"]
      interval: 10s
      timeout: 5s
      retries: 10

  # -----------------------------
  # Zord services
  # -----------------------------
  zord-edge:
    build:
      context: ./backend/zord-edge
      dockerfile: Dockerfile
    container_name: zord-edge
    ports:
      - "8080:8080"
    env_file:
      - ./backend/zord-intent-engine/.env
    environment:
      - DB_HOST=zord-edge-postgres
      - DB_PORT=5432
      - DB_USER=zord_user
      - DB_PASSWORD=zord_password
      - DB_NAME=zord_edge_db
      - DB_SSLMODE=disable
      - REDIS_ADDR=zord-redis:6379
      - ENVIRONMENT=production
      - AWS_REGION=ap-south-1
      - AWS_EC2_METADATA_DISABLED=${AWS_EC2_METADATA_DISABLED:-false}
      - S3_BUCKET=arealis-zord-vault
    depends_on:
      zord-edge-postgres:
        condition: service_healthy
      zord-redis:
        condition: service_healthy
    networks:
      - zord-network
    restart: unless-stopped

  zord-intent-engine:
    build:
      context: ./backend/zord-intent-engine
      dockerfile: Dockerfile
    container_name: zord-intent-engine
    ports:
      - "8083:8083"
    env_file:
      - ./backend/zord-intent-engine/.env
    environment:
      - DB_HOST=zord-intent-postgres
      - DB_PORT=5432
      - DB_USER=intent_user
      - DB_PASSWORD=intent_password
      - DB_NAME=zord_intent_engine_db
      - DB_SSLMODE=disable
      - REDIS_ADDR=zord-redis:6379
      - ENVIRONMENT=production
      - PII_TOKEN_SECRET=change-this-secret
      - AWS_REGION=ap-southeast-2
      - AWS_EC2_METADATA_DISABLED=${AWS_EC2_METADATA_DISABLED:-false}
      - S3_BUCKET=canonical-worm-storage
    depends_on:
      zord-intent-postgres:
        condition: service_healthy
      zord-redis:
        condition: service_healthy
    networks:
      - zord-network
    restart: unless-stopped

  zord-relay:
    build:
      context: ./backend/zord-relay
      dockerfile: Dockerfile
    container_name: zord-relay
    ports:
      - "8082:8082"
    environment:
      - KAFKA_BROKERS=broker1:9092,broker2:9093,broker3:9094
      - KAFKA_CONSUMER_GROUP=zord-relay-group
      - KAFKA_READY_TOPIC=z.intent.ready.v1
      - KAFKA_DLQ_TOPIC=z.intent.dlq.v1
      - SINK_DATABASE_URL=postgres://relay_user:relay_password@zord-relay-postgres:5432/zord_relay_db?sslmode=disable
      - SOURCE_DATABASE_URL=postgres://intent_user:intent_password@zord-intent-postgres:5432/zord_intent_engine_db?sslmode=disable
      - OUTBOX_WORKER_COUNT=24
      - OUTBOX_BATCH_SIZE=10
      - OUTBOX_MAX_RETRIES=5
      - OUTBOX_RETRY_BACKOFF_MS=50
      - OUTBOX_POLL_INTERVAL_SEC=5
      - SERVICE_NAME=zord-relay
      - HEALTH_PORT=8082
    depends_on:
      zord-relay-postgres:
        condition: service_healthy
      zord-intent-postgres:
        condition: service_healthy
      broker1:
        condition: service_healthy
      broker2:
        condition: service_healthy
      broker3:
        condition: service_healthy
    networks:
      - zord-network
    restart: unless-stopped

  zord-prompt-layer:
    build:
      context: ./backend/zord-prompt-layer
      dockerfile: Dockerfile
    container_name: zord-prompt-layer
    # Keep prompt-layer internal; zord-console proxies via /api/prompt-layer so users don't need a port.
    env_file:
      
      - ./backend/zord-prompt-layer/.env
    environment:
      - ONNXRUNTIME_SHARED_LIBRARY_PATH=/opt/onnxruntime/lib/libonnxruntime.so
      - LD_LIBRARY_PATH=/opt/onnxruntime/lib
      - CHROMA_URL=http://chroma:8000
    depends_on:
      zord-edge-postgres:
        condition: service_healthy
      zord-intent-postgres:
        condition: service_healthy
      zord-relay-postgres:
        condition: service_healthy
      chroma:
        condition: service_started
    networks:
      - zord-network
    restart: unless-stopped

  chroma:
    image: chromadb/chroma:latest
    container_name: chroma
    volumes:
      - chroma_data:/chroma/chroma
    networks:
      - zord-network
    restart: unless-stopped

  zord-console:
    build:
      context: ./backend/zord-console
      dockerfile: Dockerfile
    container_name: zord-console
    ports:
      - "80:3000"
    environment:
      - NODE_ENV=production
      - NEXT_TELEMETRY_DISABLED=1
      - PORT=3000
      - HOSTNAME=0.0.0.0
      - ZORD_EDGE_URL=http://zord-edge:8080
      - ZORD_INTENT_ENGINE_URL=http://zord-intent-engine:8083
      - ZORD_VAULT_URL=http://zord-edge:8080
      - ZORD_CONTRACTS_URL=http://zord-relay:8082
      - ZORD_PII_ENCLAVE_URL=http://zord-intent-engine:8083
      # Next API route proxies to prompt-layer; browser uses same-origin /api/prompt-layer (no port).
      - PROMPT_LAYER_URL=http://zord-prompt-layer:8086

    depends_on:
      - zord-edge
      - zord-intent-engine
      - zord-prompt-layer
      - zord-relay
    networks:
      - zord-network
    restart: unless-stopped
    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://127.0.0.1:3000/api/health || exit 1",
        ]
      interval: 30s
      timeout: 10s
      retries: 3
      start_period: 40s

networks:
  zord-network:
    driver: bridge

volumes:
  edge_postgres_data:
  intent_postgres_data:
  relay_postgres_data:
  redis_data:
  kafka1_data:
  kafka1_metadata:
  kafka2_data:
  kafka2_metadata:
  kafka3_data:
  kafka3_metadata:
  chroma_data:
